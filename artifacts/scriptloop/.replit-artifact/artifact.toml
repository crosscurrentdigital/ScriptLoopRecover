kind = "web"
previewPath = "/"
title = "ScriptLoop"
version = "1.0.0"
id = "artifacts/scriptloop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24169

[services.development]
run = "pnpm --filter @workspace/scriptloop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scriptloop", "run", "build" ]
publicDir = "artifacts/scriptloop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24169"
BASE_PATH = "/"
