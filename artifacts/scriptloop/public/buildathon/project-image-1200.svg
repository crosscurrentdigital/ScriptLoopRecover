<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B0F7A"/>
      <stop offset="55%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2DD4BF" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#2DD4BF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <style>
      .word { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; font-weight: 700; fill: #FFFFFF; letter-spacing: -3px; }
      .tag  { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; font-weight: 500; fill: #C4B5FD; letter-spacing: 4px; }
    </style>
  </defs>

  <rect width="1200" height="1200" rx="120" fill="url(#bg)"/>
  <rect width="1200" height="1200" rx="120" fill="url(#glow)"/>

  <!-- waveform bars (script lines motif) -->
  <g opacity="0.55" fill="url(#wave)">
    <rect x="170" y="892" width="10" height="34" rx="5"/>
    <rect x="200" y="876" width="10" height="66" rx="5"/>
    <rect x="230" y="858" width="10" height="102" rx="5"/>
    <rect x="260" y="838" width="10" height="142" rx="5"/>
    <rect x="290" y="850" width="10" height="118" rx="5"/>
    <rect x="320" y="822" width="10" height="174" rx="5"/>
    <rect x="350" y="800" width="10" height="218" rx="5"/>
    <rect x="380" y="824" width="10" height="170" rx="5"/>
    <rect x="410" y="852" width="10" height="114" rx="5"/>
    <rect x="440" y="810" width="10" height="198" rx="5"/>
    <rect x="470" y="838" width="10" height="142" rx="5"/>
    <rect x="500" y="864" width="10" height="90" rx="5"/>
    <rect x="530" y="834" width="10" height="150" rx="5"/>
    <rect x="560" y="810" width="10" height="198" rx="5"/>
    <rect x="590" y="780" width="10" height="258" rx="5"/>
    <rect x="620" y="810" width="10" height="198" rx="5"/>
    <rect x="650" y="844" width="10" height="130" rx="5"/>
    <rect x="680" y="822" width="10" height="174" rx="5"/>
    <rect x="710" y="800" width="10" height="218" rx="5"/>
    <rect x="740" y="828" width="10" height="162" rx="5"/>
    <rect x="770" y="852" width="10" height="114" rx="5"/>
    <rect x="800" y="838" width="10" height="142" rx="5"/>
    <rect x="830" y="858" width="10" height="102" rx="5"/>
    <rect x="860" y="876" width="10" height="66" rx="5"/>
    <rect x="890" y="888" width="10" height="42" rx="5"/>
    <rect x="920" y="896" width="10" height="26" rx="5"/>
    <rect x="950" y="894" width="10" height="30" rx="5"/>
    <rect x="980" y="888" width="10" height="42" rx="5"/>
    <rect x="1010" y="892" width="10" height="34" rx="5"/>
  </g>

  <!-- Mark: stylized loop + S -->
  <g transform="translate(420 200) scale(7.2)" stroke-linecap="round" stroke-linejoin="round" stroke-width="6.4" fill="none">
    <path d="M 22,46 C 22,32 42,32 42,18" stroke="#2DD4BF"/>
    <path d="M 42,18 C 42,8 30,8 26,16 C 20,28 32,30 32,32 C 32,34 44,36 38,48 C 34,56 22,56 22,46" stroke="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="780" text-anchor="middle" class="word" font-size="148">ScriptLoop</text>

  <!-- Tagline -->
  <text x="600" y="1080" text-anchor="middle" class="tag" font-size="34">MEMORIZE  ANYTHING  ON  LOOP</text>
</svg>
