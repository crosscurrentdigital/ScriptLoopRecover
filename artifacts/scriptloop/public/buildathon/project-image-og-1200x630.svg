<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B0F7A"/>
      <stop offset="55%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2DD4BF" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#2DD4BF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <style>
      .word { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; font-weight: 700; fill: #FFFFFF; letter-spacing: -2.5px; }
      .tag  { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; font-weight: 500; fill: #C4B5FD; letter-spacing: 3px; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mark on the left -->
  <g transform="translate(90 175) scale(4.4)" stroke-linecap="round" stroke-linejoin="round" stroke-width="6.4" fill="none">
    <path d="M 22,46 C 22,32 42,32 42,18" stroke="#2DD4BF"/>
    <path d="M 42,18 C 42,8 30,8 26,16 C 20,28 32,30 32,32 C 32,34 44,36 38,48 C 34,56 22,56 22,46" stroke="#FFFFFF"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="400" y="320" class="word" font-size="120">ScriptLoop</text>
  <text x="404" y="380" class="tag" font-size="26">MEMORIZE  ANYTHING  ON  LOOP</text>

  <!-- waveform bars -->
  <g opacity="0.55" fill="url(#wave)">
    <rect x="404" y="470" width="8" height="28" rx="4"/>
    <rect x="428" y="458" width="8" height="52" rx="4"/>
    <rect x="452" y="442" width="8" height="84" rx="4"/>
    <rect x="476" y="426" width="8" height="116" rx="4"/>
