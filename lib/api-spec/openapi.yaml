openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: preferences
    description: Per-user reading preferences
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /preferences:
    get:
      operationId: getReadingPreferences
      tags: [preferences]
      summary: Read the signed-in user's reading preferences
      responses:
        "200":
          description: Current preferences (reading may be null when unset)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesEnvelope"
        "401":
          description: Unauthorized
    put:
      operationId: updateReadingPreferences
      tags: [preferences]
      summary: Update the signed-in user's reading preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reading]
              properties:
                reading:
                  $ref: "#/components/schemas/ReadingPreferences"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesEnvelope"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ReadingPreferences:
      type: object
      additionalProperties: false
      required:
        - fontFamily
        - backgroundColor
        - textColor
        - letterSpacing
        - lineHeight
        - fontSize
      properties:
        fontFamily:
          type: string
          minLength: 1
          maxLength: 64
        backgroundColor:
          type: string
          minLength: 1
          maxLength: 64
        textColor:
          type: string
          minLength: 1
          maxLength: 64
        letterSpacing:
          type: number
          minimum: 0
          maximum: 8
        lineHeight:
          type: number
          minimum: 1
          maximum: 3
        fontSize:
          type: integer
          minimum: 10
          maximum: 48
    PreferencesEnvelope:
      type: object
      required: [reading]
      properties:
        reading:
          oneOf:
            - $ref: "#/components/schemas/ReadingPreferences"
            - type: "null"

